<h1 mat-dialog-title>Add agroupations</h1>
<div mat-dialog-content>
  <section class="example-section">
    <h4>Select your agroupations:</h4>
    <p>
      <mat-checkbox
        (click)="onAgroupation(agroupation.id)"
        *ngFor="let agroupation of agroupations"
        >{{ agroupation.title }}</mat-checkbox
      >
    </p>
  </section>
</div>
<div mat-dialog-actions>
  <button mat-button mat-dialog-close>Cancel</button>
  <button
    mat-button
    cdkFocusInitial
    [mat-dialog-close]="getResult()"
  >
    Ok
  </button>
</div>
