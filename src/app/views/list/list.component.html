<div class="button-row">
  <h1 class="title">{{ list?.title }}</h1>
  <button (click)="openDialogAddGroup()" mat-icon-button>
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="container">
  <div class="row">
    <div
      *ngFor="let group of groups; let i = index"
      class="col-md-4"
    >
      <h2>{{ group.title }}</h2>
      <mat-list role="list">
        <mat-list-item *ngFor="let item of group.items">{{
          item
        }}</mat-list-item>
      </mat-list>
    </div>
  </div>
</div>
